amcl:
  ros__parameters:

    use_sim_time: true

    #Frames
    base_frame_id: "base_footprint"
    global_frame_id: "map"
    odom_frame_id: "odom"

    #Topics
    scan_topic: scan
    map_topic: map

    #AMCL motion model
    robot_model_type: "nav2_amcl::DifferentialMotionModel"

    #Particle filter
    min_particles: 500
    max_particles: 2000
    pf_err: 0.05
    pf_z: 0.99
    resample_interval: 1

    #Odometry noise
    alpha1: 0.05
    alpha2: 0.05
    alpha3: 0.05
    alpha4: 0.05
    alpha5: 0.05

    #Laser Model
    laser_model_type: "likelihood_field"
    max_beams: 60
    laser_min_range: -1.0
    laser_max_range: 3.5
    laser_likelihood_max_dist: 2.0

    #Sensor model weights
    z_hit: 0.5
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.5
    sigma_hit: 0.2

    #Update settings
    update_min_d: 0.25
    update_min_a: 0.2

    #TF
    tf_broadcast: true
    transform_tolerance: 1.0

    #Initial pose
    set_initial_pose: true
    always_reset_initial_pose: false
    initial_pose: 
      x: -2.0
      y: 0.5
      yaw: 0.0
    
    #Recovery
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0

    save_pose_rate: 0.5
    do_beamskip: false
    first_map_only: false
    